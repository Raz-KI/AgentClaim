# Scaffold — wire services when implementation begins
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentclaim
      POSTGRES_PASSWORD: agentclaim
      POSTGRES_DB: agentclaim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # backend:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
